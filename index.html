<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>elevenbeans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --text: #0a0a0a;
      --text-muted: #6b6b6b;
      --accent: #d4a373;
      --accent-hover: #c08f5e;
      --border: #e0e0e0;
      --card-bg: #ffffff;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --max-w: 720px;
      --gap: 2rem;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    body.dark {
      --bg: #121212;
      --text: #e8e8e8;
      --text-muted: #999;
      --border: #2a2a2a;
      --card-bg: #1a1a1a;
    }

    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s;
      z-index: 100;
    }

    .theme-toggle:hover {
      background: var(--card-bg);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <!-- content will be added in subsequent tasks -->
  <script>
    /* JS will be added in a later task */
  </script>
</body>
</html>
